name = "github-firehose"
main = "src/index.ts"
compatibility_date = "2024-01-01"

[[routes]]
pattern = "github-firehose.ainorthstar.tech"
custom_domain = true

[[routes]]
pattern = "firehose.ainorthstar.tech"
custom_domain = true

[triggers]
crons = ["0 * * * *"]

[vars]
DASHBOARD_PIN = "4314"
# Secrets (set via wrangler secret put):
# GITHUB_WEBHOOK_SECRET — HMAC secret shared with GitHub webhooks
# CF_WEBHOOK_TOKEN — token sent in cf-webhook-auth header from Cloudflare notifications
# GITHUB_TOKEN — personal access token for cron webhook sync

[[kv_namespaces]]
binding = "FIREHOSE_KV"
id = "b4114a58f5a44290ab4ff18e7477d001"

[[migrations]]
tag = "v2"
deleted_classes = ["FirehoseDO"]
